<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
     <meta http-equiv="refresh" content="0; url=frontend/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donation Dapp</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        
        input, button {
            padding: 12px 20px;
            margin: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        
        input {
            width: 60%;
        }
        
        button {
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            transition: all 0.3s ease;
        }
        
        button:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        #connectButton {
            background: #3498db;
            margin-bottom: 20px;
        }
        
        #connectButton:hover {
            background: #2980b9;
        }
        
        .info {
            background: #f8f9fa;
            padding: 20px;
            margin: 20px 0;
            border-radius: 12px;
            text-align: left;
        }
        
        .info p {
            margin: 10px 0;
            font-size: 18px;
            color: #333;
        }
        
        .info strong {
            color: #4CAF50;
        }
        
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        @media (max-width: 600px) {
            body {
                margin: 20px auto;
                padding: 10px;
            }
            
            .container {
                padding: 20px;
            }
            
            input, button {
                width: 90%;
                margin: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🙏 Donation Dapp</h1>
       
        <button id="connectButton">🔗 Connect Wallet</button>

        <div class="info">
            <p>📊 Total Donated: <strong id="total">0 ETH</strong></p>
            <p>👥 Donor Counter: <strong id="count">0</strong></p>
            <p>💰 Contract Balance: <strong id="balance">0 ETH</strong></p>
        </div>

        <div>
            <input type="number" id="amount" placeholder="Amount in ETH" step="0.01" min="0">
            <button id="donateBtn" disabled>💝 Donate</button>
        </div>
        
        <div id="status" class="status"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
