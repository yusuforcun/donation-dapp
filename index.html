<!DOCTYPE html>
<html lang="tr">
    <head>
        <meta charset="UTF-8">
        <title>Donation Dapp</title>
        <style>
            body {
                font-family: Arial;
                max-width: 500px;
                margin: 50px auto;
                padding: 20px;
                text-align: center;
            }
            input, button {
                padding: 10px;
                margin: 10px;
                font-size: 16px;
            }
            button {
                cursor: pointer;
                background: #4CAF50;
                color: white;
                border: none;
                border-radius: 5px;
            }
            .info {
                background: #f0f0f0;
                padding: 15px;
                margin: 20px 0;
                border-radius: 10px;
            }
        </style>
    </head>
    
    <body>
        <h1>Basic Donation Dapp</h1>
       
        <button id="connectButton"> Connect Wallet</button>

        <div class="info">
            <p>📊 Total Donate: <strong id="total">0 ETH</strong></p>
            <p>👥 Donater Counter: <strong id="count">0</strong></p>
            <p>💰 Contract budget: <strong id="balance">0 ETH</strong></p>
        </div>

        <div>
            <input type="number" id="amount" placeholder="ETH " step="0.01">
            <button id="donateBtn" disabled>Donate</button>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <script>
        // KONTRAT ADRESİNİ BURAYA YAZ (Remix'ten deploy edince alacaksın)
        const CONTRACT_ADDRESS = "0xb27A31f1b0AF2946B7F582768f03239b1eC07c2c";  
        
        // ABI (sadece ihtiyacın olan fonksiyonlar)
        const ABI = [
            {
                "inputs": [],
                "name": "donate",
                "outputs": [],
                "stateMutability": "payable",
                "type": "function"
            },
            {
                "inputs": [],
                "name": "totalDonations",
                "outputs": [{"internalType": "uint256","name": "","type": "uint256"}],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [],
                "name": "donorCount",
                "outputs": [{"internalType": "uint256","name": "","type": "uint256"}],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [],
                "name": "getBalance",
                "outputs": [{"internalType": "uint256","name": "","type": "uint256"}],
                "stateMutability": "view",
                "type": "function"
            }
        ];
        
        let web3, contract, account;
        
        async function connectWallet() {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                account = accounts[0];
                web3 = new Web3(window.ethereum);
                contract = new web3.eth.Contract(ABI, CONTRACT_ADDRESS);
                
                document.getElementById('connectBtn').innerText = account.slice(0,6)+'...'+account.slice(-4);
                document.getElementById('donateBtn').disabled = false;
                
                await updateStats();
            } else {
                alert('MetaMask yüklü değil!');
            }
        }
        
        async function updateStats() {
            if (!contract) return;
            const total = await contract.methods.totalDonations().call();
            const count = await contract.methods.donorCount().call();
            const balance = await contract.methods.getBalance().call();
            
            document.getElementById('total').innerText = web3.utils.fromWei(total, 'ether') + ' ETH';
            document.getElementById('count').innerText = count;
            document.getElementById('balance').innerText = web3.utils.fromWei(balance, 'ether') + ' ETH';
        }
        
        async function donate() {
            const amount = document.getElementById('amount').value;
            if (!amount || amount <= 0) {
                alert('Miktar girin');
                return;
            }
            
            const weiAmount = web3.utils.toWei(amount, 'ether');
            
            try {
                await contract.methods.donate().send({
                    from: account,
                    value: weiAmount,
                    gas: 100000
                });
                
                document.getElementById('status').innerText = '✅ Bağış başarılı!';
                await updateStats();
                document.getElementById('amount').value = '';
            } catch(err) {
                document.getElementById('status').innerText = '❌ Hata: ' + err.message;
            }
        }
        
        document.getElementById('connectBtn').onclick = connectWallet;
        document.getElementById('donateBtn').onclick = donate;
    </script>

    </body>
</html>
